syntax = "proto3";
package greeter;

message GreetRequest {
  string name = 1;
}

message GreetResponse {
  string message = 1;
}

message CountRequest {
  string text = 1;
}

message CountResponse {
  uint32 letters = 1;
  uint32 words = 2;
}

service Greeter {
  rpc Greet(GreetRequest) returns (GreetResponse);
  rpc Count(CountRequest) returns (CountResponse);
}
